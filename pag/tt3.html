<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elizandro Pedro - Página Inicial</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', Arial, sans-serif;
}

 

body{
min-height:100vh;
display:flex;
flex-direction:column;
}
 
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#009b3a;
z-index:-3;
}

 
body::after{
content:"";
position:fixed;
top:50%;
left:50%;
width:800px;
height:800px;
background:#ffdf00;
transform:translate(-50%,-50%) rotate(45deg);
z-index:-2;
}

 
.fundo-brasil{
position:fixed;
top:60%;
left:60%;
width:450px;
height:450px;
background:#002776;
border-radius:50%;
transform:translate(-50%,-50%);
z-index:-1;
}

 

.cabecalho{
padding:30px;
display:flex;
align-items:center;
gap:30px;
}

 

.nome{
background:#1f7a6d;
padding:25px 35px;
color:white;
font-weight:bold;
letter-spacing:4px;
font-size:22px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

 

.menu{
display:flex;
gap:15px;
}

.menu a{
text-decoration:none;
background:#2bbbad;
color:white;
padding:12px 20px;
border-radius:30px;
font-weight:bold;
transition:0.3s;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.menu a:hover{
background:#009688;
transform:scale(1.05);
}
 

main{
display:flex;
justify-content:center;
padding:80px 20px;
}

.box{
background:#f5f5f5;
max-width:450px;
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.box h2{
color:#1f7a6d;
font-size:32px;
margin-bottom:20px;
}

.box p{
font-size:18px;
color:#002776;
line-height:1.6;
}
  .cards {
            display: flex;
            justify-content: space-around;
            padding: 40px 20px;
            background: white;
        }

        .card {
            width: 30%;
            background: #e8f5e9;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .card h3 {
            margin-bottom: 10px;
        }

       
        .conteudo {
            display: flex;
            gap: 20px;
            padding: 40px 20px;
        }

        .box-texto {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 50%;
        }

        .box-texto h2 {
            margin-bottom: 10px;
            color: #2e7d32;
        }


        footer {
            background-color: #1b5e20;
            color: white;
            text-align: center;
            padding: 25px;
            margin-top: 20px;
        }

        footer p {
            font-size: 14px;
        }


</style>
</head>

<body>

<div class="fundo-brasil"></div>

<header class="cabecalho">

<div class="nome">
<a href="../index.html">Página Inicial</a>
</div>

 
</header>

 <section class="cards">
     
   <div class="card">
        <img src="../files/IMG-20260303-WA0514.jpg" > 
        
      </div>

    <div class="card">
        <img src="../files/IMG-20260303-WA0511.jpg" >
         
      </div>
</section>

<section class="conteudo">
   <center> <div class="box-texto"> 
    <p>
Esta é a página inicial do trabalho de <b>Elizandro Pedro</b>.
Aqui você pode acessar os conteúdos organizados por trimestre.
</p>    
    </div>
 </center>
</section>

<footer>
    <p>© 2026 - Trabalho de TLP</p>
    <p>Desenvolvido pela Maria Pacheco</p>
</footer>

</body>


</html>
